name: CI

on:
  pull_request:
  push:
    branches: [ main, feature/** ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-gomod-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-gomod-

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Generate Swagger docs
        run: make docs.gen

      - name: Check Swagger docs drift
        run: make docs.check-dirty

      - name: Generate GraphQL contracts and manifest
        run: make graphql.queries graphql.manifest

      - name: Validate GraphQL contracts against schema
        run: make graphql.validate

      - name: Check GraphQL contracts drift
        run: make graphql.check-dirty

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Upload swagger.json
        uses: actions/upload-artifact@v4
        with:
          name: swagger-json
          path: contracts/openapi/swagger.json

      - name: Upload swagger.yaml
        uses: actions/upload-artifact@v4
        with:
          name: swagger-yaml
          path: contracts/openapi/swagger.yaml
