name: Auto PR

on:
  push:
    branches:
      - feature/*
      - bugfix/*
      - refactor/*
      - docs/*
      - tests/*
      - devops/*
      - database/*

concurrency:
  group: auto-pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  auto-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create pull request if missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          existing="$(gh pr list --repo "$REPOSITORY" --head "$BRANCH_NAME" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "$existing" ]]; then
            echo "PR #$existing already exists for $BRANCH_NAME"
            exit 0
          fi

          set +e
          output="$(gh pr create \
            --repo "$REPOSITORY" \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Auto PR — ${BRANCH_NAME}" \
            --body "$(printf '## Description\n\nAutomated PR for branch \`%s\`.\n\n> Link to the corresponding issue before merging.' "$BRANCH_NAME")" 2>&1)"
          status=$?
          set -e

          if [[ $status -eq 0 ]]; then
            echo "$output"
          elif [[ "$output" == *"not permitted to create or approve pull requests"* ]]; then
            echo "Auto-PR skipped: Actions not allowed to create PRs (enable in Settings → Actions → General)"
          else
            echo "$output"
            exit $status
          fi
